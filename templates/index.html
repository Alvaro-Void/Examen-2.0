<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Proyecto Estadística</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Título principal -->
    <h1 class="text-center mb-5">
        Sistema Estadístico
    </h1>

    <div class="row">

        <!-- Recorrer variables -->
        {% for variable in variables %}

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <!-- Nombre de variable -->
                    <h3>{{ variable }}</h3>

                    <!-- Enlace al análisis -->
                    <a
                        href="/variable/{{ variable }}"
                        class="btn btn-primary"
                    >
                        Ver análisis
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
